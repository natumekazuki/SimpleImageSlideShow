<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
	<!-- 背景グラデーション -->
	<defs>
		<linearGradient id="bgGradTile" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#1E88E5"/>
			<stop offset="100%" stop-color="#26C6DA"/>
		</linearGradient>
		<linearGradient id="tileGrad1" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#FFF3E0"/>
			<stop offset="100%" stop-color="#FFE0B2"/>
		</linearGradient>
		<linearGradient id="tileGrad2" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#E8F5E9"/>
			<stop offset="100%" stop-color="#C8E6C9"/>
		</linearGradient>
		<linearGradient id="tileGrad3" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#E3F2FD"/>
			<stop offset="100%" stop-color="#BBDEFB"/>
		</linearGradient>
		<linearGradient id="tileGrad4" x1="0" y1="0" x2="1" y2="1">
			<stop offset="0%" stop-color="#F3E5F5"/>
			<stop offset="100%" stop-color="#E1BEE7"/>
		</linearGradient>
	</defs>

	<!-- 丸角スクエア背景 -->
	<rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bgGradTile)"/>

	<!-- 内側のカード（少し浮かせた感じ） -->
	<rect x="80" y="88" width="352" height="336" rx="40"
		  fill="rgba(255,255,255,0.96)" stroke="rgba(255,255,255,0.7)" stroke-width="2"/>

	<!-- タイル領域（4分割グリッド） -->
	<!-- タイルの位置計算用（ざっくり固定レイアウト） -->
	<!-- 左上タイル -->
	<rect x="100" y="112" width="144" height="144" rx="20"
		  fill="url(#tileGrad1)" stroke="#CFD8DC" stroke-width="2"/>
	<!-- 左上タイルの簡易サムネ表現（山＋太陽） -->
	<path d="M112 236 L148 184 L176 212 L212 172 L232 196 L232 236 Z"
		  fill="#FFB74D" opacity="0.85"/>
	<circle cx="132" cy="140" r="14" fill="#FFCA28"/>

	<!-- 右上タイル -->
	<rect x="268" y="112" width="144" height="144" rx="20"
		  fill="url(#tileGrad2)" stroke="#CFD8DC" stroke-width="2"/>
	<rect x="284" y="132" width="104" height="32" rx="10" fill="#A5D6A7" opacity="0.9"/>
	<rect x="284" y="174" width="88" height="10" rx="5" fill="#81C784" opacity="0.85"/>
	<rect x="284" y="194" width="72" height="10" rx="5" fill="#81C784" opacity="0.7"/>

	<!-- 左下タイル -->
	<rect x="100" y="280" width="144" height="144" rx="20"
		  fill="url(#tileGrad3)" stroke="#CFD8DC" stroke-width="2"/>
	<rect x="116" y="296" width="112" height="64" rx="14" fill="#90CAF9" opacity="0.9"/>
	<rect x="116" y="368" width="96" height="14" rx="7" fill="#64B5F6" opacity="0.9"/>

	<!-- 右下タイル（フォーカス＋再生マーク付き） -->
	<rect x="268" y="280" width="144" height="144" rx="20"
		  fill="url(#tileGrad4)" stroke="#8E24AA" stroke-width="3"/>

	<!-- スライドショーを示す再生ボタン（右下タイル中央） -->
	<circle cx="340" cy="352" r="40" fill="rgba(255,255,255,0.95)" stroke="#8E24AA" stroke-width="2"/>
	<polygon points="332,332 360,352 332,372"
			 fill="#8E24AA"/>

	<!-- 進行中を示す小さなインジケーター（下部） -->
	<rect x="176" y="408" width="160" height="10" rx="5" fill="#CFD8DC"/>
	<rect x="176" y="408" width="72" height="10" rx="5" fill="#8E24AA"/>

	<!-- タイトル的な短いテキストライン（オプションで雰囲気だけ） -->
	<rect x="176" y="386" width="112" height="8" rx="4" fill="#B0BEC5" opacity="0.9"/>
</svg>
