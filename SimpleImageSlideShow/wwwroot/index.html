<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SimpleImageSlideShow</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="SimpleImageSlideShow.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script>
      // Utility functions exposed to Blazor components
      window.app = window.app || {};
      window.app.addResizeListener = function(dotnetRef){
        function h(){ dotnetRef.invokeMethodAsync('OnResize', window.innerWidth, window.innerHeight); }
        window.addEventListener('resize', h);
        h();
        return { dispose: function(){ window.removeEventListener('resize', h); } };
      };

      window.app.getViewportSize = function(){
        return { width: window.innerWidth, height: window.innerHeight };
      };

      window.app.enablePanelInteraction = function(panelId, dotnetRef){
        var panel = document.getElementById(panelId);
        if(!panel) return;
        // Observe size only (no drag), to persist width/height
        try {
          var ro = new ResizeObserver(function(){
            var cs = window.getComputedStyle(panel);
            var w = parseFloat(cs.width)||0, h = parseFloat(cs.height)||0;
            dotnetRef.invokeMethodAsync('OnPanelSizeChanged', w, h);
          });
          ro.observe(panel);
        } catch {}
      };

      // Lightweight image preloader to warm browser cache
      window.app.preloadImage = (function(){
        var cache = [];
        var MAX = 64;
        return function(url){
          try {
            var img = new Image();
            img.decoding = 'async';
            img.src = url;
            cache.push(img);
            if(cache.length > MAX) cache.shift();
          } catch {}
        };
      })();

      window.app.audioVolume = 0;
      window.app.currentAudioController = null;

      window.app.setAudioVolume = function(volume){
        try {
          var num = Number(volume);
          if (!isFinite(num)) num = 0;
          num = Math.max(0, Math.min(1, num));
          window.app.audioVolume = num;
          if (window.app.currentAudioController && window.app.currentAudioController.audio) {
            window.app.currentAudioController.audio.volume = num;
          }
        } catch {
          window.app.audioVolume = 0;
        }
      };

      window.app.stopAudioPlayback = function(){
        var ctrl = window.app.currentAudioController;
        if (!ctrl) return;
        ctrl.finish(ctrl.audio.currentTime || 0);
      };

      window.app.playAudioAndWait = function(url){
        return new Promise(function(resolve){
          try { window.app.stopAudioPlayback(); } catch {}
          try {
            var audio = new Audio(url);
            audio.preload = 'auto';
            audio.volume = window.app.audioVolume ?? 0;
            var controller = {
              audio: audio,
              finished: false,
              finish: function(val){
                if (controller.finished) return;
                controller.finished = true;
                if (window.app.currentAudioController === controller) {
                  window.app.currentAudioController = null;
                }
                try { audio.pause(); } catch {}
                var result = (typeof val === 'number' && !isNaN(val)) ? val : (audio.duration || audio.currentTime || 0);
                resolve(result || 0);
              }
            };
            window.app.currentAudioController = controller;
            audio.addEventListener('ended', function(){ controller.finish(audio.duration || audio.currentTime || 0); });
            audio.addEventListener('error', function(){ controller.finish(0); });
            audio.addEventListener('abort', function(){ controller.finish(audio.currentTime || 0); });
            var playPromise = audio.play();
            if (playPromise && typeof playPromise.then === 'function') {
              playPromise.catch(function(){ controller.finish(0); });
            }
          } catch {
            resolve(0);
          }
        });
      };
    </script>
</body>

</html>
