<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>SimpleImageSlideShow</title>
    <base href="/" />
    <link rel="stylesheet" href="css/bootstrap/bootstrap.min.css" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="SimpleImageSlideShow.styles.css" />
    <link rel="icon" type="image/png" href="favicon.png" />
</head>

<body>

    <div class="status-bar-safe-area"></div>

    <div id="app">Loading...</div>

    <div id="blazor-error-ui">
        An unhandled error has occurred.
        <a href="" class="reload">Reload</a>
        <a class="dismiss">🗙</a>
    </div>

    <script src="_framework/blazor.webview.js" autostart="false"></script>
    <script>
      (function(){
        var timer;
        var delay = 2000;
        function showCursor(){ document.body.classList.remove('hide-cursor'); }
        function scheduleHide(){
          clearTimeout(timer);
          showCursor();
          timer = setTimeout(function(){ document.body.classList.add('hide-cursor'); }, delay);
        }
        ['mousemove','mousedown','mouseenter','touchstart','wheel','pointermove'].forEach(function(ev){
          window.addEventListener(ev, scheduleHide, { passive: true });
        });
        scheduleHide();
      })();
      window.app = window.app || {};
      window.app.addResizeListener = function(dotnetRef){
        function h(){ dotnetRef.invokeMethodAsync('OnResize', window.innerWidth, window.innerHeight); }
        window.addEventListener('resize', h);
        h();
        return { dispose: function(){ window.removeEventListener('resize', h); } };
      };

      window.app.enablePanelInteraction = function(panelId, dotnetRef){
        var panel = document.getElementById(panelId);
        if(!panel) return;
        // Observe size only (no drag), to persist width/height
        try {
          var ro = new ResizeObserver(function(){
            var cs = window.getComputedStyle(panel);
            var w = parseFloat(cs.width)||0, h = parseFloat(cs.height)||0;
            dotnetRef.invokeMethodAsync('OnPanelSizeChanged', w, h);
          });
          ro.observe(panel);
        } catch {}
      };
    </script>
</body>

</html>
